<svg xmlns="http://www.w3.org/2000/svg" viewBox="-7 -7 142 110" width="142" height="110" shape-rendering="crispEdges">
  <defs>
    <filter id="ph" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#7a0046" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#ph)">
    <!-- chunky black outline (inflated body cells) -->
    <g fill="#1a0212">
      <rect x="13" y="-3" width="38" height="22"/>
      <rect x="77" y="-3" width="38" height="22"/>
      <rect x="-3" y="13" width="134" height="22"/>
      <rect x="-3" y="29" width="134" height="22"/>
      <rect x="13" y="45" width="102" height="22"/>
      <rect x="29" y="61" width="70" height="22"/>
      <rect x="45" y="77" width="38" height="22"/>
    </g>
    <!-- body -->
    <g fill="#ff2fb0">
      <rect x="16" y="0" width="32" height="16"/>
      <rect x="80" y="0" width="32" height="16"/>
      <rect x="0" y="16" width="128" height="16"/>
      <rect x="0" y="32" width="128" height="16"/>
      <rect x="16" y="48" width="96" height="16"/>
      <rect x="32" y="64" width="64" height="16"/>
      <rect x="48" y="80" width="32" height="16"/>
    </g>
    <!-- highlight -->
    <g fill="#ff9ad8">
      <rect x="16" y="16" width="16" height="16"/>
      <rect x="32" y="16" width="16" height="16"/>
      <rect x="16" y="0" width="16" height="16"/>
    </g>
    <!-- shadow -->
    <g fill="#b80f6b">
      <rect x="96" y="48" width="16" height="16"/>
      <rect x="80" y="64" width="16" height="16"/>
      <rect x="64" y="80" width="16" height="16"/>
    </g>
  </g>
</svg>
